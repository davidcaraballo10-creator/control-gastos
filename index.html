<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de gastos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Gestor de finanzas</p>
        <h1>Control de gastos</h1>
        <p class="lead">Añade tus gastos, controla tus categorías y visualiza tu evolución diaria.</p>
      </div>
      <div class="summary-card">
        <span>Total gastado</span>
        <strong id="totalAmount">€0.00</strong>
      </div>
    </header>

    <main>
      <section class="form-card">
        <h2>Añadir gasto</h2>
        <form id="expenseForm">
          <label>
            Descripción
            <input type="text" id="description" placeholder="Café, supermercado, transporte" required>
          </label>
          <label>
            Cantidad (€)
            <input type="number" id="amount" min="0.01" step="0.01" placeholder="12.50" required>
          </label>
          <label>
            Categoría
            <select id="category" required>
              <option value="Alimentación">Alimentación</option>
              <option value="Transporte">Transporte</option>
              <option value="Ocio">Ocio</option>
              <option value="Hogar">Hogar</option>
              <option value="Otros">Otros</option>
            </select>
          </label>
          <label>
            Fecha
            <input type="date" id="date" required>
          </label>
          <input type="hidden" id="expenseIndex" value="">
          <div class="form-actions">
            <button type="submit" class="primary-button" id="submitButton">Añadir gasto</button>
            <button type="button" class="secondary-button hidden" id="cancelEdit">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="dashboard-grid">
        <article class="panel">
          <h2>Gastos recientes</h2>
          <ul id="expenseList" class="expense-list"></ul>
        </article>

        <article class="panel stats-panel">
          <div class="stat-item">
            <span>Gastos total</span>
            <strong id="expenseCount">0</strong>
          </div>
          <div class="stat-item">
            <span>Categorías usadas</span>
            <strong id="categoryCount">0</strong>
          </div>
          <div class="stat-item">
            <span>Último gasto</span>
            <strong id="lastExpense">N/A</strong>
          </div>
        </article>
      </section>

      <section class="charts-grid">
        <article class="chart-card">
          <h2>Evolución diaria</h2>
          <canvas id="dailyChart" width="600" height="300"></canvas>
        </article>
        <article class="chart-card">
          <h2>Distribución por categoría</h2>
          <canvas id="categoryChart" width="600" height="300"></canvas>
        </article>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
